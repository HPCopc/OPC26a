version: 1
backend:
  phases:
    preBuild:  
      commands:
        - nvm install 22
        - nvm use 22
        - node --version
        - npm --version
        - npm install -g esbuild
    build:
      commands:
        - rm -f package-lock.json
        - npm install
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 22
        - nvm use 22
        - node --version
        - npm --version
        - rm -f package-lock.json
        - npm install
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*
      - node_modules/**/*