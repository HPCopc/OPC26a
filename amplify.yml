version: 1
backend:
  phases:
    preBuild:  # ← ADD THIS SECTION
      commands:
        - npm install -g esbuild  # Install esbuild globally for Lambda bundling
        - nvm use 20  # Switch to Node.js 20 (more stable for Amplify)
        - node --version  # Verify version
    build:
      commands:
        - npm ci --cache .npm --prefer-offline
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:  # ← ADD THIS SECTION
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*
      - node_modules/**/*